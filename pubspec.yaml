name: attendance_app
description: An app to maintain the attendance, punch timings, leave details, personal info of an employee in a company

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  table_calendar: ^3.0.9 #Used later for: attendance calendar, leave tracking
  sqflite: ^2.3.0 #SQLite Database
  path: ^1.9.0 #database file paths
  shared_preferences: ^2.2.2 #used in "Remember Me"


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

#including the login page image
flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpg
    - assets/data/users.json